<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400" font-family="ui-sans-serif,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="900" height="400" rx="10" fill="#0d1117"/>

  <text x="34" y="44" fill="#e6edf3" font-size="19" font-weight="700">Permissive consumption and silent failure are the same sentence</text>
  <text x="34" y="68" fill="#7d8590" font-size="14">read from two directions.</text>

  <!-- source vault -->
  <rect x="34" y="106" width="228" height="176" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="50" y="132" fill="#e6edf3" font-size="14" font-weight="600">Obsidian vault</text>
  <text x="50" y="156" fill="#7d8590" font-size="12.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">215 concept pages</text>
  <text x="50" y="176" fill="#7d8590" font-size="12.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">valid YAML frontmatter</text>
  <text x="50" y="196" fill="#7d8590" font-size="12.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">non-empty `type`</text>
  <rect x="50" y="212" width="196" height="52" rx="6" fill="#1f2733" stroke="#3d444d"/>
  <text x="62" y="234" fill="#d2a8ff" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">756 [[wikilinks]]</text>
  <text x="62" y="253" fill="#7d8590" font-size="11.5">every relationship you have</text>

  <!-- arrow -->
  <line x1="272" y1="194" x2="352" y2="194" stroke="#3d444d" stroke-width="2"/>
  <polygon points="352,194 342,189 342,199" fill="#3d444d"/>
  <text x="264" y="168" fill="#7d8590" font-size="11.5">a conforming</text>
  <text x="264" y="183" fill="#7d8590" font-size="11.5">OKF consumer</text>

  <!-- outcomes -->
  <rect x="366" y="106" width="500" height="80" rx="8" fill="#0f2417" stroke="#2ea04326"/>
  <circle cx="396" cy="146" r="11" fill="#238636"/>
  <path d="M391 146 l4 4 l7 -8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="420" y="140" fill="#3fb950" font-size="14.5" font-weight="700">okf validate: CONFORMANT</text>
  <text x="420" y="162" fill="#7d8590" font-size="12.5">All three section 9 criteria pass. There is no error to report.</text>

  <rect x="366" y="200" width="500" height="82" rx="8" fill="#2b1416" stroke="#f8514926"/>
  <circle cx="396" cy="241" r="11" fill="#da3633"/>
  <line x1="391" y1="236" x2="401" y2="246" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="401" y1="236" x2="391" y2="246" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <text x="420" y="235" fill="#ff7b72" font-size="14.5" font-weight="700">knowledge graph: 0 edges</text>
  <text x="420" y="257" fill="#7d8590" font-size="12.5">Wikilink syntax appears nowhere in the spec. To a markdown</text>
  <text x="420" y="274" fill="#7d8590" font-size="12.5">parser, every one of them is literal text.</text>

  <!-- punchline -->
  <rect x="34" y="306" width="832" height="62" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="54" y="332" fill="#e6edf3" font-size="14.5" font-weight="600">Your graph does not fail to load. Your graph is not there.</text>
  <text x="54" y="354" fill="#7d8590" font-size="13">The spec instructs consumers: &#8220;MUST NOT reject a bundle&#8221; for broken links. So nothing ever tells you.</text>
</svg>
